name: Build and Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download latest rootfs tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo highoncomputers/DebianDroid \
            --json tagName --jq '.[] | select(.tagName | startswith("rootfs-")) | .tagName' | sort -V | tail -1)
          if [ -z "$TAG" ]; then
            echo "No rootfs release found"
            exit 1
          fi
          mkdir -p app/src/main/assets
          gh release download "$TAG" --repo highoncomputers/DebianDroid \
            -p "*.tar.gz" --dir app/src/main/assets/
          mv app/src/main/assets/*.tar.gz app/src/main/assets/rootfs.tar.gz
          echo "Rootfs size: $(du -h app/src/main/assets/rootfs.tar.gz | cut -f1)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Copy APK to sdcard/apkfiles
        run: |
          mkdir -p sdcard/apkfiles
          cp app/build/outputs/apk/release/app-release.apk sdcard/apkfiles/

      - name: Copy rootfs to sdcard/apkfiles
        run: cp app/src/main/assets/rootfs.tar.gz sdcard/apkfiles/

      - name: Upload APK (sdcard path)
        uses: actions/upload-artifact@v4
        with:
          name: apkfiles
          path: sdcard/apkfiles/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## DebianDroid v${{ github.run_number }}

            Automated release built from commit ${{ github.sha }}.

            ### What's included
            - Debian Trixie desktop environment (XFCE4)
            - Embedded VNC viewer
            - Integrated terminal
            - File manager
            - Persistent storage

            ### Installation
            1. Download the APK
            2. Enable "Install from unknown sources"
            3. Install and launch
            4. Follow the one-time setup wizard to extract the Debian rootfs (no network required)
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
